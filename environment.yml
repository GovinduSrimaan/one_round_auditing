# environment.yml — conda/micromamba environment for privacy-audit (Python 3.12)
#
# Create:  micromamba env create -f environment.yml -n privacy-audit
# Activate: micromamba activate privacy-audit

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.12
  - pytorch>=2.3
  - torchvision>=0.18
  - pytorch-cuda=12.1       # omit on CPU-only machines
  - opacus>=1.5
  - numpy>=1.26
  - matplotlib>=3.8
  - scipy>=1.13
  - scikit-learn>=1.4
  - python-dotenv>=1.0
  - tqdm>=4.66
  - ruff>=0.4
  - mlflow>=2.13
  - filelock>=3.13
  - pandas>=2.2
  - pyarrow>=16             # for parquet reading in the notebook
  - jupyterlab>=4.0
  - ipywidgets>=8.1
